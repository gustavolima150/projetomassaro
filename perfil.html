<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meu Perfil – Flowtask</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Verificar autenticação imediatamente
    checkAuthentication();
  </script>
  <style>
    .perfil-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    .perfil-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .perfil-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #6C63FF, #9C8FFF);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 48px;
      font-weight: 700;
      position: relative;
      overflow: hidden;
      border: 4px solid var(--bg);
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .perfil-avatar:hover {
      transform: scale(1.05);
    }
    .perfil-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .upload-label {
      position: absolute;
      bottom: 0;
      right: 0;
      background: #6C63FF;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      cursor: pointer;
    }
    input[type="file"] {
      display: none;
    }
    .perfil-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .perfil-email {
      color: var(--text-muted);
      margin-bottom: 30px;
    }
    .form-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }
    .form-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      background: var(--input-bg);
      color: var(--text);
      box-sizing: border-box;
    }
    .form-input:focus {
      outline: none;
      border-color: #6C63FF;
      box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.1);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 30px;
    }
    .btn {
      flex: 1;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: #6C63FF;
      color: white;
    }
    .btn-primary:hover {
      background: #5651d4;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(108, 99, 255, 0.3);
    }
    .btn-secondary {
      background: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover {
      background: var(--border-hover);
    }
    .success-msg {
      background: #4CAF50;
      color: white;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    .success-msg.show {
      display: block;
    }
  </style>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <header class="topbar" id="topbar"></header>
    <main class="page-content">
      <div class="perfil-container">
        <div class="perfil-header">
          <div class="perfil-avatar" onclick="document.getElementById('foto-input').click()">
            <img id="avatar-preview" style="display:none;"/>
            <span id="avatar-initials">A</span>
            <label class="upload-label" title="Clique para alterar a foto">📷</label>
            <input type="file" id="foto-input" accept="image/*"/>
          </div>
          <div class="perfil-title" id="perfil-titulo">Seu Perfil</div>
          <div class="perfil-email" id="perfil-email">email@example.com</div>
        </div>

        <div class="success-msg" id="success-msg">✅ Perfil atualizado com sucesso!</div>

        <div class="form-card">
          <form id="form-perfil">
            <div class="form-group">
              <label class="form-label">Nome Completo</label>
              <input type="text" class="form-input" id="nome-input" placeholder="Seu nome" required/>
            </div>

            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="email-input" placeholder="seu@email.com" readonly/>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Telefone</label>
                <input type="tel" class="form-input" id="telefone-input" placeholder="(11) 98765-4321"/>
              </div>
              <div class="form-group">
                <label class="form-label">Departamento</label>
                <input type="text" class="form-input" id="depto-input" placeholder="Ex: TI, RH"/>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Bio / Descrição</label>
              <textarea class="form-input" id="bio-input" placeholder="Conte um pouco sobre você..." style="min-height:100px;"></textarea>
            </div>

            <div class="btn-group">
              <button type="submit" class="btn btn-primary">💾 Salvar Alterações</button>
              <button type="button" class="btn btn-secondary" onclick="window.history.back()">← Voltar</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>
  // Inicializar
  document.getElementById('sidebar').innerHTML = getSidebarHTML('perfil.html');
  const user = Storage.getUser();
  
  document.getElementById('topbar').innerHTML = getTopbarHTML('👤 Meu Perfil', 'Edite suas informações pessoais');
  document.getElementById('perfil-email').textContent = user.email || 'email@example.com';
  document.getElementById('email-input').value = user.email || '';
  document.getElementById('nome-input').value = user.name || '';
  document.getElementById('telefone-input').value = user.phone || '';
  document.getElementById('depto-input').value = user.department || '';
  document.getElementById('bio-input').value = user.bio || '';
  document.getElementById('avatar-initials').textContent = App.getInitials(user.name || 'U');

  // Mostrar foto se existir
  if (user.avatar && user.avatar.startsWith('data:')) {
    document.getElementById('avatar-preview').src = user.avatar;
    document.getElementById('avatar-preview').style.display = 'block';
    document.getElementById('avatar-initials').style.display = 'none';
  }

  // Upload de foto
  document.getElementById('foto-input').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = (event) => {
      const base64 = event.target.result;
      user.avatar = base64;

      const img = document.getElementById('avatar-preview');
      img.src = base64;
      img.style.display = 'block';
      document.getElementById('avatar-initials').style.display = 'none';
    };
    reader.readAsDataURL(file);
  });

  // Salvar formulário
  document.getElementById('form-perfil').addEventListener('submit', (e) => {
    e.preventDefault();

    user.name = document.getElementById('nome-input').value;
    user.phone = document.getElementById('telefone-input').value;
    user.department = document.getElementById('depto-input').value;
    user.bio = document.getElementById('bio-input').value;

    Storage.setUser(user);

    document.getElementById('perfil-titulo').textContent = user.name;
    document.getElementById('avatar-initials').textContent = App.getInitials(user.name);

    const msg = document.getElementById('success-msg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 3000);
  });
</script>
</body>
</html>
