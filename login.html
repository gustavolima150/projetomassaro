<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Flowtask</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="js/theme.js"></script>
</head>
<body>
<div class="auth-page">
  <!-- Theme Toggle -->
  <div class="theme-toggle-fixed">
    <button id="theme-btn" class="theme-btn" title="Alternar tema">🌙</button>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <div class="logo-icon">✓</div>
          <div class="logo-text">Flowtask</div>
        </div>
        <h2>Bem-vindo de volta!</h2>
        <p>Acesse sua conta e continue gerenciando seus projetos</p>
      </div>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="email" placeholder="seu@email.com" required/>
        </div>

        <div class="form-group">
          <label class="form-label">Senha</label>
          <input type="password" class="form-input" id="senha" placeholder="••••••••" required/>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Entrar</button>
      </form>

      <div class="auth-footer">
        <p>Não tem conta? <a href="cadastro.html" class="auth-link">Cadastre-se aqui</a></p>
      </div>

      <div class="auth-divider">ou</div>

      <a href="landing.html" class="btn btn-secondary btn-block">← Voltar</a>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Theme toggle
  const themeBtn = document.getElementById('theme-btn');
  themeBtn.textContent = Theme.getIcon();
  themeBtn.addEventListener('click', () => {
    Theme.toggle();
    themeBtn.textContent = Theme.getIcon();
  });

  // Form submission
  const form = document.getElementById('login-form');
  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;

    try {
      // Chamar o novo backend Node.js
      const response = await fetch('https://projetomassaro-production.up.railway.app/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ email, password: senha })
      });

      const data = await response.json();

      if (data.success) {
        // Salvar session no localStorage
        localStorage.setItem('auth_token', data.session.access_token);
        localStorage.setItem('user_id', data.user.id);
        localStorage.setItem('user_name', data.user.name || data.user.email);
        localStorage.setItem('user_email', data.user.email);
        
        window.location.href = 'index.html';
      } else {
        alert(data.message || 'Email ou senha incorretos');
      }
    } catch (error) {
      console.error('Erro:', error);
      alert('Erro ao fazer login. Verifique se o servidor backend está online.');
    }
  });
});
</script>
</body>
</html>
